<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8002D;--red-dim:rgba(232,0,45,.12);--red-border:rgba(232,0,45,.3);
  --blue:#00AAFF;--blue-dim:rgba(0,170,255,.1);--blue-border:rgba(0,170,255,.25);
}
body{
  --bg:#0C0C0F;--bg2:#141418;--bg3:#1C1C22;--bg4:#242430;
  --txt:#F0EFF4;--txt2:#9A98A6;--txt3:#5C5A6E;
  --card-hover:rgba(255,255,255,.03);
  --shadow:rgba(0,0,0,.4);
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .35s,color .35s;
  font-size:16px; /* BASE AUMENTADA */
}
body.light{
  --bg:#F2F2F0;--bg2:#FFFFFF;--bg3:#EAEAE6;--bg4:#D8D8D2;
  --txt:#111110;--txt2:#5A5955;--txt3:#9A9990;
  --card-hover:rgba(0,0,0,.02);
  --shadow:rgba(0,0,0,.12);
}
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(12,12,15,.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bg4);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .35s,border-color .35s;
}
body.light .app-header{background:rgba(242,242,240,.92);}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:3px;
  display:flex;align-items:center;gap:0;
  user-select:none;
}
.logo-mo{color:var(--red);animation:blinkMO 1.6s ease-in-out infinite;}
@keyframes blinkMO{0%,100%{opacity:1}50%{opacity:.15}}
.logo-workout{color:var(--txt);transition:color .35s}
.header-right{display:flex;align-items:center;gap:8px}
.btn-theme{
  display:flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--bg4);
  color:var(--txt2);font-family:'Inter',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-theme:hover{background:var(--bg4);color:var(--txt)}
.btn-theme i{font-size:15px}
.header-badge{
  font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;
  background:var(--bg3);color:var(--txt2);
  border:1px solid var(--bg4);transition:all .3s;
}
.header-badge.marcio{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.header-badge.manu{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}
.screen{display:none;min-height:calc(100vh - 61px);padding:24px 16px 40px}
.screen.active{display:block}
.select-header{text-align:center;padding:36px 0 32px}
.select-eyebrow{
  font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--txt3);margin-bottom:14px;
}
.select-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;letter-spacing:2px;line-height:1;color:var(--txt);transition:color .35s;
}
.select-title span{color:var(--red)}
.profile-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:8px}
.profile-card{
  border-radius:16px;padding:26px 22px;cursor:pointer;
  display:flex;align-items:center;gap:18px;
  border:1px solid var(--bg4);background:var(--bg2);
  transition:border-color .25s,transform .18s,background .35s;
  position:relative;overflow:hidden;
}
.profile-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;}
.profile-card.marcio::before{background:linear-gradient(135deg,var(--red-dim),transparent 60%)}
.profile-card.manu::before{background:linear-gradient(135deg,var(--blue-dim),transparent 60%)}
.profile-card:hover::before{opacity:1}
.profile-card:hover{transform:translateY(-2px)}
.profile-card.marcio:hover{border-color:var(--red-border)}
.profile-card.manu:hover{border-color:var(--blue-border)}
.profile-card:active{transform:scale(.97)}
.pc-avatar{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  flex-shrink:0;position:relative;z-index:1;
}
.pc-avatar.red{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.pc-avatar.blue{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.pc-info{flex:1;position:relative;z-index:1}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1.1}
.pc-name.red{color:var(--red)}
.pc-name.blue{color:var(--blue)}
.pc-sub{font-size:14px;color:var(--txt2);margin-top:3px;font-weight:500;letter-spacing:.5px}
.pc-stats{display:flex;gap:8px;margin-top:10px}
.pc-stat{font-size:11px;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:20px}
.marcio .pc-stat{background:var(--red-dim);color:var(--red)}
.manu .pc-stat{background:var(--blue-dim);color:var(--blue)}
.pc-arrow{font-size:24px;color:var(--txt3);transition:color .2s,transform .2s;position:relative;z-index:1}
.profile-card:hover .pc-arrow{transform:translateX(4px)}
.profile-card.marcio:hover .pc-arrow{color:var(--red)}
.profile-card.manu:hover .pc-arrow{color:var(--blue)}
.workout-topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.btn-back{
  width:42px;height:42px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--bg4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;color:var(--txt2);
  transition:all .2s;flex-shrink:0;
}
.btn-back:hover{background:var(--bg4);color:var(--txt)}
.workout-name{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;transition:color .35s}
.workout-name.red{color:var(--red)}
.workout-name.blue{color:var(--blue)}
.workout-sub{font-size:14px;color:var(--txt2);font-weight:500;letter-spacing:.5px;margin-top:1px}
.plan-tabs{
  display:flex;gap:8px;margin-bottom:22px;
  overflow-x:auto;padding-bottom:4px;scrollbar-width:none;
}
.plan-tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:10px 18px;border-radius:10px;
  border:1px solid var(--bg4);background:var(--bg2);
  color:var(--txt2);font-size:14px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab-btn:hover{border-color:var(--txt3);color:var(--txt)}
.tab-btn.active.red{background:var(--red-dim);border-color:var(--red-border);color:var(--red)}
.tab-btn.active.blue{background:var(--blue-dim);border-color:var(--blue-border);color:var(--blue)}
.progress-wrap{
  margin-bottom:20px;background:var(--bg2);
  border-radius:10px;border:1px solid var(--bg4);padding:16px 18px;
  transition:background .35s,border-color .35s;
}
.progress-top{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center}
.progress-label{font-size:13px;font-weight:600;color:var(--txt2)}
.progress-val{font-size:13px;font-weight:700;color:var(--txt)}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),#FF6B6B);transition:width .4s ease}
.progress-fill.blue{background:linear-gradient(90deg,var(--blue),#66CCFF)}
.plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.plan-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--txt);transition:color .35s}
.plan-count{font-size:13px;color:var(--txt3);font-weight:600}
.groups-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.group-chip{
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;
  background:var(--bg3);color:var(--txt3);
  border:1px solid var(--bg4);cursor:pointer;transition:all .18s;
}
.group-chip.active-r{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.group-chip.active-b{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}
.exercise-list{display:grid;grid-template-columns:1fr;gap:12px}
.ex-card{
  border-radius:16px;background:var(--bg2);border:1px solid var(--bg4);
  overflow:hidden;transition:border-color .2s,background .35s;
}
.ex-row{display:flex;align-items:center;gap:12px;padding:16px 18px;position:relative}
.ex-row.row1{border-bottom:1px solid var(--bg4);border-left:3px solid var(--red)}
.ex-row.row2{border-left:3px solid var(--blue)}
.ex-row.single{border-left:3px solid var(--red)}
.ex-num{
  width:30px;height:30px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;
}
.ex-num.r{background:var(--red-dim);color:var(--red)}
.ex-num.b{background:var(--blue-dim);color:var(--blue)}
.ex-info{flex:1;min-width:0}
.ex-gtag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;margin-bottom:5px;
}
.ex-name{font-size:16px;font-weight:700;color:var(--txt);display:block;line-height:1.25;transition:color .35s}
.ex-reps{font-size:13px;color:var(--txt2);margin-top:4px;display:flex;align-items:center;gap:5px;font-weight:600}
.ex-reps i{font-size:13px}
.btn-demo{
  width:48px;height:48px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;flex-shrink:0;border:1px solid;transition:all .18s;
}
.btn-demo:active{transform:scale(.92)}
.btn-demo.r{color:var(--red);border-color:var(--red-border);background:var(--red-dim)}
.btn-demo.r:hover{background:var(--red);color:#fff}
.btn-demo.b{color:var(--blue);border-color:var(--blue-border);background:var(--blue-dim)}
.btn-demo.b:hover{background:var(--blue);color:#fff}
.tag-costas{background:rgba(56,129,204,.15);color:#5B9FD8}
.tag-peito{background:rgba(204,56,56,.15);color:#D87A7A}
.tag-ombro{background:rgba(56,171,100,.15);color:#5DC47A}
.tag-biceps{background:rgba(204,160,56,.15);color:#D4A850}
.tag-triceps{background:rgba(130,56,204,.15);color:#A06ED4}
.tag-core{background:rgba(130,130,130,.15);color:#909090}
.tag-gluteo{background:rgba(204,56,130,.15);color:#D46EA0}
.tag-adut{background:rgba(56,204,170,.15);color:#50C8A8}
.tag-pant{background:rgba(56,100,204,.15);color:#6A90D8}
.tag-posterior{background:rgba(80,150,204,.15);color:#70B0D4}
.tag-quad{background:rgba(204,80,56,.15);color:#D88060}
.biset-label{
  padding:8px 18px;background:rgba(0,170,255,.06);
  border-bottom:1px solid var(--bg4);
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--blue);display:flex;align-items:center;gap:6px;
}
.btn-check{
  background:none;border-radius:8px;
  padding:7px 14px;cursor:pointer;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:5px;letter-spacing:.5px;
  transition:all .2s;font-family:'Inter',sans-serif;
}
.modal-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.88);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  width:100%;max-width:400px;background:var(--bg2);
  border-radius:20px;border:1px solid var(--bg4);overflow:hidden;
  transform:scale(.92) translateY(16px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .35s;
}
.modal-overlay.open .modal-box{transform:scale(1) translateY(0)}
.modal-header{
  padding:16px 18px 14px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--bg4);
}
.modal-title{font-size:17px;font-weight:700;color:var(--txt);line-height:1.2;transition:color .35s}
.modal-sub{font-size:13px;color:var(--txt2);margin-top:3px}
.btn-close-modal{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--bg4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--txt2);transition:all .18s;
}
.btn-close-modal:hover{background:var(--bg4);color:var(--txt)}
.modal-media{
  width:100%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  min-height:280px;position:relative;overflow:hidden;transition:background .35s;
}
.modal-media img{width:100%;height:100%;object-fit:contain;max-height:300px}
.modal-footer{
  padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.modal-reps{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--txt)}
.btn-close-full{
  padding:11px 24px;border-radius:10px;background:var(--red);color:#fff;
  font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  border:none;cursor:pointer;transition:background .18s,transform .15s;
}
.btn-close-full:hover{background:#c40026}
.btn-close-full:active{transform:scale(.96)}
@media(min-width:600px){
  .profile-grid{grid-template-columns:1fr 1fr}
  .screen{padding:28px 24px 48px}
  .app-header{padding:16px 28px}
}
@media(min-width:900px){
  .screen{padding:32px 40px 60px;max-width:720px;margin:0 auto}
}
</style>
</head>
<body>
<header class="app-header">
  <div class="logo">
    <span class="logo-mo">MO</span><span class="logo-workout">&nbsp;WORKOUT</span>
  </div>
  <div class="header-right">
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">
      <i class="ti ti-sun" id="theme-icon"></i>
      <span id="theme-label">CLARO</span>
    </button>
    <div class="header-badge" id="hbadge">SELECIONE</div>
  </div>
</header>
<div class="screen active" id="screen-select">
  <div class="select-header">
    <div class="select-eyebrow">Programa de treino</div>
    <div class="select-title">ESCOLHA<br>SEU <span>PERFIL</span></div>
  </div>
  <div class="profile-grid">
    <div class="profile-card marcio" onclick="showProfile('marcio')">
      <div class="pc-avatar red">M</div>
      <div class="pc-info">
        <div class="pc-name red">MÁRCIO</div>
        <div class="pc-sub">Definição & Força</div>
        <div class="pc-stats">
          <span class="pc-stat">3 TREINOS</span>
          <span class="pc-stat">A · B · C</span>
        </div>
      </div>
      <i class="ti ti-chevron-right pc-arrow"></i>
    </div>
    <div class="profile-card manu" onclick="showProfile('manu')">
      <div class="pc-avatar blue">MA</div>
      <div class="pc-info">
        <div class="pc-name blue">MANUELLA</div>
        <div class="pc-sub">Hipertrofia & Precisão</div>
        <div class="pc-stats">
          <span class="pc-stat">3 TREINOS</span>
          <span class="pc-stat">A · B · C</span>
        </div>
      </div>
      <i class="ti ti-chevron-right pc-arrow"></i>
    </div>
  </div>
</div>
<div class="screen" id="screen-workout">
  <div class="workout-topbar">
    <div class="btn-back" onclick="goBack()"><i class="ti ti-arrow-left"></i></div>
    <div>
      <div class="workout-name" id="workout-name">MÁRCIO</div>
      <div class="workout-sub" id="workout-sub">Definição & Força</div>
    </div>
  </div>
  <div class="plan-tabs" id="plan-tabs"></div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">Progresso do treino</span>
      <span class="progress-val" id="prog-val">0 / 0 exercícios</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="plan-content"></div>
</div>
<div class="modal-overlay" id="modal" onclick="handleModalClick(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Exercício</div>
        <div class="modal-sub" id="modal-sub">Demonstração</div>
      </div>
      <div class="btn-close-modal" onclick="closeModal()"><i class="ti ti-x"></i></div>
    </div>
    <div class="modal-media" id="modal-media">
      <img id="modal-img" src="" alt="">
    </div>
    <div class="modal-footer">
      <div class="modal-reps"><i class="ti ti-repeat"></i><span id="modal-reps">-</span></div>
      <button class="btn-close-full" onclick="closeModal()">FECHAR</button>
    </div>
  </div>
</div>

      {biset:true,g1:"adut",n1:"Abdução Máquina",r1:"4×15",i1:GIF.abdutora,g2:"adut",n2:"Adução na Polia",r2:"4×12",i2:GIF.abducao_polia},
      {biset:true,g1:"posterior",n1:"Stiff Halteres",r1:"3×10",i1:GIF.stiff_halter,g2:"posterior",n2:"RDL Terra Unilateral",r2:"3×10",i2:GIF.rdl_uni}
    ]}
  ]}
};
let manualOverride=false;
function applyTheme(t){
  const icon=document.getElementById('theme-icon'),label=document.getElementById('theme-label');
  if(t==='light'){document.body.classList.add('light');icon.className='ti ti-moon';label.textContent='ESCURO';}
  else{document.body.classList.remove('light');icon.className='ti ti-sun';label.textContent='CLARO';}
}
function toggleTheme(){manualOverride=true;applyTheme(document.body.classList.contains('light')?'dark':'light');}
let currentProfile=null,currentPlan=0,checkedSet=new Set(),activeFilter=null;
function showProfile(id){
  currentProfile=id;currentPlan=0;checkedSet=new Set();activeFilter=null;
  const u=DB[id];
  if(!manualOverride)applyTheme(u.defaultTheme);
  const hb=document.getElementById('hbadge');
  hb.textContent=u.nome;hb.className='header-badge '+id;
  document.getElementById('workout-name').textContent=u.nome;
  document.getElementById('workout-name').className='workout-name '+u.color;
  document.getElementById('workout-sub').textContent=u.sub;
  document.getElementById('screen-select').classList.remove('active');
  document.getElementById('screen-workout').classList.add('active');
  renderTabs();renderPlan();
}
function goBack(){
  currentProfile=null;manualOverride=false;applyTheme('dark');
  const hb=document.getElementById('hbadge');hb.textContent='SELECIONE';hb.className='header-badge';
  document.getElementById('screen-workout').classList.remove('active');
  document.getElementById('screen-select').classList.add('active');
}
function renderTabs(){
  const u=DB[currentProfile];
  document.getElementById('plan-tabs').innerHTML=u.planos.map((p,i)=>
    `<button class="tab-btn${i===0?' active '+u.color:''}" onclick="switchPlan(${i})">${p.t.split(':')[0]}</button>`
  ).join('');
}
function switchPlan(i){
  const u=DB[currentProfile];
  document.querySelectorAll('.tab-btn').forEach((b,idx)=>{b.className='tab-btn'+(idx===i?' active '+u.color:'');});
  currentPlan=i;checkedSet=new Set();activeFilter=null;renderPlan();
}
function toggleCheck(key){
  if(checkedSet.has(key))checkedSet.delete(key);else checkedSet.add(key);
  updateProgress();
  const btn=document.getElementById('chk-'+key);if(!btn)return;
  const done=checkedSet.has(key);
  const col=DB[currentProfile].color==='red'?'#E8002D':'#00AAFF';
  btn.style.borderColor=done?col:'var(--txt3)';btn.style.color=done?col:'var(--txt3)';
  btn.innerHTML=`<i class="ti ${done?'ti-check':'ti-circle'}" aria-hidden="true"></i>${done?'FEITO':'MARCAR'}`;
}
function updateProgress(){
  const plan=DB[currentProfile].planos[currentPlan];
  const total=plan.ex.length,done=checkedSet.size;
  document.getElementById('prog-val').textContent=`${done} / ${total} exercícios`;
  const pct=total>0?Math.round((done/total)*100):0;
  const fill=document.getElementById('prog-fill');
  fill.style.width=pct+'%';
  fill.className='progress-fill'+(DB[currentProfile].color==='blue'?' blue':'');
}
function renderPlan(){
  const u=DB[currentProfile];const plan=u.planos[currentPlan];const acR=u.color==='red';
  let html=`<div class="plan-header"><div class="plan-title">${plan.t}</div><div class="plan-count">${plan.ex.length} exercícios</div></div>`;
  const grupos=[...new Set(plan.ex.flatMap(e=>e.biset?[e.g1,e.g2]:[e.g1]))];
  html+=`<div class="groups-bar">${grupos.map(g=>`<span class="group-chip" onclick="filterGroup('${g}',this)" data-group="${g}">${LABELS[g]||g}</span>`).join('')}</div>`;
  html+=`<div class="exercise-list" id="ex-list">`;
  plan.ex.forEach((ex,idx)=>{
    const key=`${currentPlan}-${idx}`;const done=checkedSet.has(key);
    const col=acR?'#E8002D':'#00AAFF';const bc=done?col:'var(--txt3)';
    const chkHtml=`<button id="chk-${key}" class="btn-check" onclick="toggleCheck('${key}')" style="border:1px solid ${bc};color:${bc};"><i class="ti ${done?'ti-check':'ti-circle'}" aria-hidden="true"></i>${done?'FEITO':'MARCAR'}</button>`;
    const footer=`<div style="display:flex;align-items:center;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--bg4);">${chkHtml}</div>`;
    if(ex.biset){
      html+=`<div class="ex-card" data-groups="${ex.g1},${ex.g2}">
        <div class="biset-label"><i class="ti ti-repeat" aria-hidden="true"></i> BI-SET</div>
        <div class="ex-row row1">
          <div class="ex-num r">1</div>
          <div class="ex-info">
            <span class="ex-gtag tag-${ex.g1}">${LABELS[ex.g1]||ex.g1}</span>
            <span class="ex-name">${ex.n1}</span>
            <span class="ex-reps"><i class="ti ti-repeat" aria-hidden="true"></i> ${ex.r1}</span>
          </div>
          <button class="btn-demo r" onclick="openModal('${ex.i1}','${ex.n1}','${ex.r1}')"><i class="ti ti-player-play" aria-hidden="true"></i></button>
        </div>
        <div class="ex-row row2">
          <div class="ex-num b">2</div>
          <div class="ex-info">
            <span class="ex-gtag tag-${ex.g2}">${LABELS[ex.g2]||ex.g2}</span>
            <span class="ex-name">${ex.n2}</span>
            <span class="ex-reps"><i class="ti ti-repeat" aria-hidden="true"></i> ${ex.r2}</span>
          </div>
          <button class="btn-demo b" onclick="openModal('${ex.i2}','${ex.n2}','${ex.r2}')"><i class="ti ti-player-play" aria-hidden="true"></i></button>
        </div>
        ${footer}
      </div>`;
    }else{
      html+=`<div class="ex-card" data-groups="${ex.g1}">
        <div class="ex-row single">
          <div class="ex-num r"><i class="ti ti-barbell" style="font-size:14px" aria-hidden="true"></i></div>
          <div class="ex-info">
            <span class="ex-gtag tag-${ex.g1}">${LABELS[ex.g1]||ex.g1}</span>
            <span class="ex-name">${ex.n1}</span>
            <span class="ex-reps"><i class="ti ti-repeat" aria-hidden="true"></i> ${ex.r1}</span>
          </div>
          <button class="btn-demo r" onclick="openModal('${ex.i1}','${ex.n1}','${ex.r1}')"><i class="ti ti-player-play" aria-hidden="true"></i></button>
        </div>
        ${footer}
      </div>`;
    }
  });
  html+=`</div>`;
  document.getElementById('plan-content').innerHTML=html;
  updateProgress();
}
function filterGroup(g,el){
  const u=DB[currentProfile];const ac=u.color==='red'?'active-r':'active-b';
  if(activeFilter===g){
    activeFilter=null;
    document.querySelectorAll('.group-chip').forEach(c=>c.classList.remove('active-r','active-b'));
    document.querySelectorAll('.ex-card').forEach(c=>c.style.display='');
  }else{
    activeFilter=g;
    document.querySelectorAll('.group-chip').forEach(c=>c.classList.remove('active-r','active-b'));
    el.classList.add(ac);
    document.querySelectorAll('.ex-card').forEach(c=>{c.style.display=(c.dataset.groups||'').includes(g)?'':'none';});
  }
}
function openModal(imgUrl,name,reps){
  document.getElementById('modal-title').textContent=name;
  document.getElementById('modal-sub').textContent='Demonstração do exercício';
  document.getElementById('modal-reps').textContent=reps;
  const media=document.getElementById('modal-media');
  media.innerHTML='';
  const img=document.createElement('img');
  img.src=imgUrl;img.alt=name;
  img.onerror=function(){
    media.innerHTML=`<div style="color:var(--txt3);font-size:14px;text-align:center;padding:20px"><i class="ti ti-photo-off" style="font-size:36px;display:block;margin-bottom:8px"></i>Demo não disponível</div>`;
  };
  media.appendChild(img);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function handleModalClick(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
